<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devinette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="game-card">
        <h1>Devinez le Nombre</h1>
        <p class="subtitle">Essayez de deviner un nombre entre 1 et 100.</p>

        <div class="input-row">
            <input type="number" id="guess" min="1" max="100" placeholder="Votre nombre">
            <button id="check-btn" type="button">Vérifier</button>
        </div>

        <p id="message">Bonne chance !</p>

        <div class="stats">
            <p>Essais: <span id="attempts">0</span></p>
            <button id="reset-btn" type="button" class="secondary">Rejouer</button>
        </div>
    </main>

    <script src="script.js" defer></script>
</body>

</html>
